<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面｜Hokkaido Singles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f5f5f5; color: #333; }

    header {
      background: #1a3a2a;
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 18px; }

    .login-box {
      max-width: 400px;
      margin: 80px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .login-box h2 { margin-bottom: 24px; color: #1a3a2a; }

    .container { max-width: 1000px; margin: 32px auto; padding: 0 16px; }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      flex: 1;
      min-width: 150px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      text-align: center;
    }
    .stat-card .num { font-size: 36px; font-weight: bold; color: #1a3a2a; }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #1a3a2a;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e0e0e0;
    }

    .user-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 12px;
    }
    .user-info h3 { font-size: 16px; margin-bottom: 4px; }
    .user-info p { font-size: 13px; color: #666; line-height: 1.8; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge.pending { background: #fff3cd; color: #856404; }
    .badge.approved { background: #d4edda; color: #155724; }
    .badge.rejected { background: #f8d7da; color: #721c24; }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn-approve { background: #1a3a2a; color: white; }
    .btn-reject { background: #e53e3e; color: white; }
    .btn-doc { background: #4a90d9; color: white; }
    .btn-approve:hover { background: #2d5a3d; }
    .btn-reject:hover { background: #c53030; }
    .btn-doc:hover { background: #357abd; }

    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    .login-btn {
      width: 100%;
      background: #1a3a2a;
      color: white;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    .error { color: #e53e3e; font-size: 13px; margin-bottom: 12px; }
    .empty { text-align: center; color: #aaa; padding: 40px; }
  </style>
</head>
<body>

<header>
  <h1>🌿 Hokkaido Singles 管理画面</h1>
  <span id="admin-name"></span>
</header>

<!-- ログイン画面 -->
<div class="login-box" id="login-section">
  <h2>管理者ログイン</h2>
  <div class="error" id="login-error"></div>
  <input type="email" id="admin-email" placeholder="メールアドレス">
  <input type="password" id="admin-password" placeholder="パスワード">
  <button class="login-btn" onclick="adminLogin()">ログイン</button>
</div>

<!-- 管理画面 -->
<div class="container" id="admin-section" style="display:none">

  <div class="stats">
    <div class="stat-card">
      <div class="num" id="stat-pending">0</div>
      <div class="label">審査待ち</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-approved">0</div>
      <div class="label">承認済み</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-total">0</div>
      <div class="label">総申込み数</div>
    </div>
  </div>

  <div class="section-title">審査待ち一覧</div>
  <div id="pending-list"></div>

  <div class="section-title" style="margin-top:32px">承認済み会員</div>
  <div id="approved-list"></div>

</div>

<script>
  let token = '';

  async function adminLogin() {
    const email = document.getElementById('admin-email').value;
    const password = document.getElementById('admin-password').value;

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('login-error').textContent = data.error || '管理者権限がありません';
      return;
    }

    token = data.token;
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('admin-section').style.display = 'block';
    document.getElementById('admin-name').textContent = data.user.email;
    loadUsers();
  }

  async function loadUsers() {
    const res = await fetch('/api/admin/users', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const users = await res.json();

    const pending = users.filter(u => u.status === 'pending');
    const approved = users.filter(u => u.status === 'approved');

    document.getElementById('stat-pending').textContent = pending.length;
    document.getElementById('stat-approved').textContent = approved.length;
    document.getElementById('stat-total').textContent = users.length;

    renderList('pending-list', pending);
    renderList('approved-list', approved);
  }

  function renderList(id, users) {
    const el = document.getElementById(id);
    if (users.length === 0) {
      el.innerHTML = '<div class="empty">該当者なし</div>';
      return;
    }
    el.innerHTML = users.map(u => `
      <div class="user-card">
        <div class="user-header">
          <div class="user-info">
            <h3>${u.nickname}（${u.full_name}）
              <span class="badge ${u.status}">${statusLabel(u.status)}</span>
            </h3>
            <p>
              メール：${u.email}<br>
              性別：${u.gender === 'male' ? '男性' : '女性'}　
              生年月日：${u.birth_date}<br>
              職業：${u.occupation || '未記入'}　
              プラン：${u.plan === 'standard' ? 'スタンダード' : 'ライト'}<br>
              申込日：${new Date(u.created_at).toLocaleDateString('ja-JP')}
            </p>
          </div>
          <div class="actions">
            ${u.id_document_url ? `
              <button class="btn btn-doc" onclick="viewDocument('${u.id}')">📄 本人確認書類</button>
            ` : '<span style="font-size:12px;color:#aaa;">書類なし</span>'}
            ${u.status === 'pending' ? `
              <button class="btn btn-approve" onclick="approve('${u.id}')">✅ 承認</button>
              <button class="btn btn-reject" onclick="reject('${u.id}')">❌ 否認</button>
            ` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function statusLabel(s) {
    if (s === 'pending') return '審査待ち';
    if (s === 'approved') return '承認済み';
    return '否認';
  }

  async function viewDocument(userId) {
    const res = await fetch('/api/admin/users/' + userId + '/id-document', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    if (!res.ok) {
      alert(data.error || '書類を取得できませんでした');
      return;
    }
    window.open(data.url, '_blank');
  }

  async function approve(id) {
    await fetch('/api/admin/users/' + id + '/approve', {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    loadUsers();
  }

  async function reject(id) {
    if (!confirm('否認しますか？')) return;
    await fetch('/api/admin/users/' + id + '/reject', {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    loadUsers();
  }
</script>

</body>
</html>
