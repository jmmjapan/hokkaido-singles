<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>入会申し込み｜Hokkaido Singles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f9f6f0; color: #333; }
    header { background: #1a3a2a; color: white; padding: 16px 24px; }
    header h1 { font-size: 18px; letter-spacing: 2px; }
    .container { max-width: 560px; margin: 48px auto; background: white; border-radius: 16px; padding: 40px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
    h2 { font-size: 22px; color: #1a3a2a; margin-bottom: 8px; }
    .sub { font-size: 14px; color: #888; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 6px; color: #555; }
    input, select { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    input:focus, select:focus { border-color: #1a3a2a; }
    .plan-select { display: flex; gap: 12px; margin-top: 6px; }
    .plan-option { flex: 1; border: 2px solid #ddd; border-radius: 12px; padding: 16px; cursor: pointer; text-align: center; }
    .plan-option.selected { border-color: #c8a45a; background: #fffbf3; }
    .plan-option h4 { font-size: 15px; margin-bottom: 4px; }
    .plan-option p { font-size: 13px; color: #888; }
    .plan-option .price { font-size: 20px; font-weight: bold; color: #1a3a2a; margin: 8px 0; }
    .btn { width: 100%; background: #1a3a2a; color: white; padding: 16px; border: none; border-radius: 32px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #2d5a3d; }
    .note { font-size: 12px; color: #aaa; text-align: center; margin-top: 16px; line-height: 1.8; }
    .error { color: #e53e3e; font-size: 13px; margin-top: 8px; display: none; }
    .success { background: #f0fff4; border: 1px solid #68d391; border-radius: 8px; padding: 16px; margin-top: 16px; display: none; color: #276749; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: normal; margin-bottom: 0; cursor: pointer; }
    .checkbox-label input[type="checkbox"] { width: auto; padding: 0; flex-shrink: 0; }
  </style>
</head>
<body>

  <header>
    <h1>🌿 Hokkaido Singles</h1>
  </header>

  <div class="container">
    <h2>入会申し込み</h2>
    <p class="sub">審査後、24時間以内にご連絡します。最初の2ヶ月は無料です。</p>

    <div class="form-group">
      <label>メールアドレス *</label>
      <input type="email" id="email" placeholder="example@email.com">
    </div>

    <div class="form-group">
      <label>パスワード *</label>
      <input type="password" id="password" placeholder="8文字以上">
    </div>

    <div class="form-group">
      <label>ニックネーム *（サービス内で表示される名前）</label>
      <input type="text" id="nickname" placeholder="例：さっぽろ太郎">
    </div>

    <div class="form-group">
      <label>本名 *（審査のみに使用・非公開）</label>
      <input type="text" id="full_name" placeholder="例：山田 太郎">
    </div>

    <div class="form-group">
      <label>生年月日 *</label>
      <input type="date" id="birth_date">
    </div>

    <div class="form-group">
      <label>性別 *</label>
      <select id="gender">
        <option value="">選択してください</option>
        <option value="male">男性</option>
        <option value="female">女性</option>
      </select>
    </div>

    <div class="form-group">
      <label>プランを選択 *</label>
      <div class="plan-select">
        <div class="plan-option" id="plan-light" onclick="selectPlan('light')">
          <h4>ライトプラン</h4>
          <div class="price">¥1,100</div>
          <p>/月</p>
        </div>
        <div class="plan-option selected" id="plan-standard" onclick="selectPlan('standard')">
          <h4>⭐ スタンダード</h4>
          <div class="price">¥3,300</div>
          <p>/月</p>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>職業 *</label>
      <input type="text" id="occupation" placeholder="例：会社員、看護師、自営業など">
    </div>

    <div class="form-group">
      <div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:16px;">
        <p style="font-size:13px;font-weight:bold;color:#e65100;margin-bottom:8px;">⚠️ 以下の活動は禁止です</p>
        <p style="font-size:12px;color:#555;margin-bottom:12px;">ネットワークビジネス・MLM・宗教・政治活動への勧誘を目的とした登録・活動を禁止します。違反が判明した場合は即退会処分となります。</p>
        <label class="checkbox-label">
          <input type="checkbox" id="agree_rules" required>
          <span>上記の禁止事項を理解し、同意します *</span>
        </label>
      </div>
    </div>

    <div class="form-group">
      <label>本人確認書類 *（運転免許証・マイナンバーカードなど）</label>
      <input type="file" id="id_document" accept="image/*,.pdf">
      <p style="font-size:12px;color:#888;margin-top:4px;">画像またはPDF（審査のみに使用・非公開）</p>
    </div>

    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" id="agree_terms" required>
        <span><a href="terms.html" target="_blank" style="color:#1a3a2a;text-decoration:underline;">利用規約</a>に同意します *</span>
      </label>
    </div>

    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg">
      ✅ 申し込みを受け付けました！24時間以内にメールをお送りします。
    </div>

    <button class="btn" onclick="register()">申し込む（無料期間2ヶ月）</button>

    <p class="note">
      入会金 3,500円は審査通過後にご請求します。<br>
      個人情報は審査目的のみに使用し、外部に提供しません。
    </p>
  </div>

  <script>
    let selectedPlan = 'standard';

    function selectPlan(plan) {
      selectedPlan = plan;
      document.getElementById('plan-light').classList.remove('selected');
      document.getElementById('plan-standard').classList.remove('selected');
      document.getElementById('plan-' + plan).classList.add('selected');
    }

    async function register() {
      const email = document.getElementById('email').value;
      const id_document = document.getElementById('id_document').files[0];
      const password = document.getElementById('password').value;
      const nickname = document.getElementById('nickname').value;
      const full_name = document.getElementById('full_name').value;
      const birth_date = document.getElementById('birth_date').value;
      const gender = document.getElementById('gender').value;
      const occupation = document.getElementById('occupation').value;
      const agree_rules = document.getElementById('agree_rules').checked;
      const agree_terms = document.getElementById('agree_terms').checked;

      if (!email || !password || !nickname || !full_name || !birth_date || !gender || !occupation) {
        showError('すべての必須項目を入力してください');
        return;
      }
      if (password.length < 8) {
        showError('パスワードは8文字以上にしてください');
        return;
      }
      if (!agree_rules) {
        showError('禁止事項への同意が必要です');
        return;
      }
      if (!agree_terms) {
        showError('利用規約への同意が必要です');
        return;
      }

      try {
        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);
        formData.append('nickname', nickname);
        formData.append('full_name', full_name);
        formData.append('birth_date', birth_date);
        formData.append('gender', gender);
        formData.append('occupation', occupation);
        formData.append('plan', selectedPlan);
        if (id_document) formData.append('id_document', id_document);

        const res = await fetch('/api/register', {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'エラーが発生しました');
          return;
        }
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';
      } catch (e) {
        showError('通信エラーが発生しました');
      }
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>

</body>
</html>
