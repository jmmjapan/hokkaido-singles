<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お申し込み完了｜Hokkaido Singles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f9f6f0; color: #333; }
    header { background: #1a3a2a; color: white; padding: 16px 24px; }
    header h1 { font-size: 18px; letter-spacing: 2px; }
    .container { max-width: 560px; margin: 48px auto; background: white; border-radius: 16px; padding: 48px 40px; box-shadow: 0 2px 16px rgba(0,0,0,0.08); text-align: center; }
    .check {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      background: #1a3a2a;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; color: white;
    }
    h2 { font-size: 22px; color: #1a3a2a; margin-bottom: 12px; }
    .lead { font-size: 15px; color: #555; line-height: 2; margin-bottom: 32px; }
    .steps {
      text-align: left;
      background: #fffbf3;
      border: 1px solid #c8a45a;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .steps h3 { font-size: 14px; color: #1a3a2a; margin-bottom: 16px; }
    .step { display: flex; gap: 12px; margin-bottom: 14px; font-size: 14px; line-height: 1.7; }
    .step:last-child { margin-bottom: 0; }
    .step .mark { color: #c8a45a; font-weight: bold; flex-shrink: 0; }
    .note { font-size: 12px; color: #aaa; line-height: 1.8; margin-bottom: 32px; }
    .btn-home {
      display: inline-block;
      background: #1a3a2a;
      color: white;
      padding: 14px 40px;
      border-radius: 32px;
      font-size: 15px;
      text-decoration: none;
    }
    .btn-home:hover { background: #2d5a3d; }
  </style>
</head>
<body>

  <header>
    <h1>🌿 Hokkaido Singles</h1>
  </header>

  <div class="container">
    <div class="check">✓</div>
    <h2>お申し込みを受け付けました</h2>
    <p class="lead">
      ご登録いただいたメールアドレスに<br>
      受付確認メールをお送りしました。
    </p>

    <div class="steps">
      <h3>このあとの流れ</h3>
      <div class="step">
        <span class="mark">①</span>
        <span>事務局にて入会審査を行います（24時間以内）</span>
      </div>
      <div class="step">
        <span class="mark">②</span>
        <span>審査結果をメールでお知らせします</span>
      </div>
      <div class="step">
        <span class="mark">③</span>
        <span>承認後、ログインしてプロフィールを作成いただけます</span>
      </div>
    </div>

    <p class="note">
      メールが届かない場合は、迷惑メールフォルダをご確認ください。<br>
      このページは閉じていただいて構いません。
    </p>

    <a class="btn-home" href="index.html">トップページへ戻る</a>
  </div>

</body>
</html>
